# Test Configuration Properties
spring.application.name=backend-test

# ========================================
# DATABASE CONFIGURATION FOR TESTING
# ========================================
# Use H2 embedded database for @DataJpaTest tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# TESTCONTAINERS CONFIGURATION
# ========================================
testcontainers.reuse.enable=false

# ========================================
# LOGGING CONFIGURATION
# ========================================
logging.level.root=INFO
logging.level.com.campussync.backend=DEBUG
logging.level.org.springframework.test=DEBUG

# ========================================
# JPA/HIBERNATE CONFIGURATION
# ========================================
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ========================================
# CACHE CONFIGURATION (DISABLED FOR TESTS)
# ========================================
spring.cache.type=none

# ========================================
# REDIS CONFIGURATION (DISABLED FOR TESTS)
# ========================================
spring.data.redis.enabled=false

# ========================================
# SECURITY CONFIGURATION
# ========================================
spring.security.user.name=test
spring.security.user.password=test

# ========================================
# JWT CONFIGURATION
# ========================================
jwt.secret=test-secret-key-for-testing-purposes-only-32-chars

# ========================================
# EMAIL CONFIGURATION (MOCKED)
# ========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@gmail.com
spring.mail.password=test-password

# ========================================
# FILE UPLOAD CONFIGURATION
# ========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
