spring.application.name=backend
spring.profiles.default=dev
server.port=${APP_PORT:8080}

# ========================================
# DATABASE CONFIGURATION - USE ENV VARS
# ========================================
# ========================================
# DATABASE CONFIGURATION
# ========================================

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&verifyServerCertificate=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.data-source-properties.useSSL=true
spring.datasource.hikari.data-source-properties.requireSSL=true
spring.datasource.hikari.data-source-properties.verifyServerCertificate=false

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}
spring.flyway.driver-class-name=${spring.datasource.driver-class-name}
# ========================================
# FILE UPLOAD CONFIGURATION
# ========================================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_FILE_SIZE:50MB}

gemini.api.key=${GEMINI_API_KEY:}
gemini.api.base-url=${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
ai.fail-fast-on-provider-error=${AI_FAIL_FAST_ON_PROVIDER_ERROR:false}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.from=${MAIL_FROM:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
jwt.secret=${JWT_SECRET:replace-this-with-a-strong-32-plus-char-secret}

# Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=${REDIS_TIMEOUT:5s}

# Disable Redis repository auto-config since we define Redis beans manually
spring.data.redis.repositories.enabled=false

# Keep local actuator health checks from probing external services unless explicitly enabled.
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
management.health.rabbit.enabled=${MANAGEMENT_HEALTH_RABBIT_ENABLED:false}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.access=unrestricted

# Payment configuration
payment.provider=${PAYMENT_PROVIDER:razorpay}
payment.currency=${PAYMENT_CURRENCY:INR}
payment.success-url=${PAYMENT_SUCCESS_URL:http://localhost:3000/payments/success}
payment.cancel-url=${PAYMENT_CANCEL_URL:http://localhost:3000/payments/cancel}
payment.razorpay.key-id=${RAZORPAY_KEY_ID:}
payment.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
payment.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# Object storage
storage.provider=${STORAGE_PROVIDER:local}
storage.public-base-url=${STORAGE_PUBLIC_BASE_URL:}
storage.signed-url-ttl=${STORAGE_SIGNED_URL_TTL:15m}
storage.s3.bucket=${S3_BUCKET:}
storage.s3.region=${AWS_REGION:ap-south-1}
storage.s3.endpoint=${S3_ENDPOINT:}
storage.s3.access-key=${AWS_ACCESS_KEY_ID:}
storage.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
storage.s3.path-style-access=${S3_PATH_STYLE_ACCESS:false}

# Security runtime behavior
security.tokens.require-redis=${SECURITY_TOKENS_REQUIRE_REDIS:false}
security.tokens.allow-in-memory-fallback=${SECURITY_TOKENS_ALLOW_IN_MEMORY_FALLBACK:true}

# Queue infrastructure
app.jobs.mode=${APP_JOBS_MODE:direct}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Resilience4j
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentGateway.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentGateway.wait-duration-in-open-state=30s
resilience4j.retry.instances.paymentGateway.max-attempts=3
resilience4j.retry.instances.paymentGateway.wait-duration=1s
resilience4j.circuitbreaker.instances.aiProvider.sliding-window-size=10
resilience4j.circuitbreaker.instances.aiProvider.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aiProvider.wait-duration-in-open-state=30s
resilience4j.retry.instances.aiProvider.max-attempts=2
resilience4j.retry.instances.aiProvider.wait-duration=500ms

# Logging
logging.pattern.level=%5p [corr:%X{correlationId:-na}]
logging.level.root=${LOG_LEVEL:INFO}
